document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

th=\"1.4\"><\u002Fline>\n                <circle cx=\"60\" cy=\"64\" r=\"44\" fill=\"none\" stroke=\"#e6dfd0\" stroke-width=\"1.5\"><\u002Fcircle>\n                <text x=\"60\" y=\"122\" text-anchor=\"middle\" font-size=\"7.5\" font-weight=\"700\" fill=\"#b9b2a1\" letter-spacing=\"0.6\">TOP-DOWN · NOSE = FRONT<\u002Ftext>\n              <\u002Fsvg>\n              <div style=\"flex:1\">\n                <div style=\"font-size:11px;color:#a39c8c;font-weight:700;letter-spacing:.05em;margin-bottom:4px\">MOST AFFECTED<\u002Fdiv>\n                <div style=\"font-size:19px;font-weight:800;color:#c07d63;line-height:1.1;margin-bottom:2px\">{{ topLocationName }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:#a39c8c;font-weight:600;margin-bottom:13px\">{{ topLocationCount }}<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:7px\">\n                  <sc-for list=\"{{ locationList }}\" as=\"l\" hint-placeholder-count=\"3\">\n                    <div style=\"display:flex;justify-content:space-between;font-size:11.5px;color:#7a7567;font-weight:600\"><span>{{ l.t }}<\u002Fspan><span style=\"color:#b3ab98\">{{ l.n }}<\u002Fspan><\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#fff;border:1px solid #efeadf;border-radius:22px;padding:18px\">\n            <div style=\"font-size:13px;font-weight:700;color:#7a7567;margin-bottom:15px\">Top symptoms<\u002Fdiv>\n            <sc-if value=\"{{ chartIsBar }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-direction:column;gap:11px\">\n              <sc-for list=\"{{ symptomBars }}\" as=\"s\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex;align-items:center;gap:10px\">\n                  <div style=\"width:88px;font-size:12px;color:#7a7567;font-weight:600;flex:none\">{{ s.t }}<\u002Fdiv>\n                  <div style=\"flex:1;height:9px;border-radius:5px;background:#f0ede5;overflow:hidden\"><div style=\"height:100%;border-radius:5px;background:linear-gradient(90deg,#7d9170,#9db391);width:{{ s.v }}\"><\u002Fdiv><\u002Fdiv>\n                  <div style=\"width:18px;text-align:right;font-size:11px;color:#b3ab98;font-weight:700;flex:none\">{{ s.n }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ chartIsLine }}\" hint-placeholder-val=\"{{ false }}\">\n            <svg viewBox=\"0 0 300 132\" style=\"width:100%;height:118px;overflow:visible\">\n              <path d=\"{{ symptomLineArea }}\" fill=\"rgba(125,145,112,.13)\" stroke=\"none\"><\u002Fpath>\n              <path d=\"{{ symptomLinePath }}\" fill=\"none\" stroke=\"#7d9170\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n              <sc-for list=\"{{ symptomLinePoints }}\" as=\"p\" hint-placeholder-count=\"5\">\n                <circle cx=\"{{ p.cx }}\" cy=\"{{ p.cy }}\" r=\"3.6\" fill=\"#fff\" stroke=\"#7d9170\" stroke-width=\"2\"><\u002Fcircle>\n                <text x=\"{{ p.vx }}\" y=\"{{ p.vy }}\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"700\" fill=\"#7a7567\">{{ p.n }}<\u002Ftext>\n                <text x=\"{{ p.lx }}\" y=\"{{ p.ly }}\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"700\" fill=\"#b3ab98\">{{ p.ll }}<\u002Ftext>\n              <\u002Fsc-for>\n            <\u002Fsvg>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div style=\"background:#fff;border:1px solid #efeadf;border-radius:22px;padding:18px\">\n            <div style=\"font-size:13px;font-weight:700;color:#7a7567;margin-bottom:15px\">Top triggers<\u002Fdiv>\n            <sc-if value=\"{{ chartIsBar }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-direction:column;gap:11px\">\n              <sc-for list=\"{{ triggerBars }}\" as=\"t\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex;align-items:center;gap:10px\">\n                  <div style=\"width:88px;font-size:12px;color:#7a7567;font-weight:600;flex:none\">{{ t.t }}<\u002Fdiv>\n                  <div style=\"flex:1;height:9px;border-radius:5px;background:#f0ede5;overflow:hidden\"><div style=\"height:100%;border-radius:5px;background:linear-gradient(90deg,#b08968,#d4ab6a);width:{{ t.v }}\"><\u002Fdiv><\u002Fdiv>\n                  <div style=\"width:18px;text-align:right;font-size:11px;color:#b3ab98;font-weight:700;flex:none\">{{ t.n }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ chartIsLine }}\" hint-placeholder-val=\"{{ false }}\">\n            <svg viewBox=\"0 0 300 132\" style=\"width:100%;height:118px;overflow:visible\">\n              <path d=\"{{ triggerLineArea }}\" fill=\"rgba(176,137,104,.14)\" stroke=\"none\"><\u002Fpath>\n              <path d=\"{{ triggerLinePath }}\" fill=\"none\" stroke=\"#b08968\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n              <sc-for list=\"{{ triggerLinePoints }}\" as=\"p\" hint-placeholder-count=\"5\">\n                <circle cx=\"{{ p.cx }}\" cy=\"{{ p.cy }}\" r=\"3.6\" fill=\"#fff\" stroke=\"#b08968\" stroke-width=\"2\"><\u002Fcircle>\n                <text x=\"{{ p.vx }}\" y=\"{{ p.vy }}\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"700\" fill=\"#7a7567\">{{ p.n }}<\u002Ftext>\n                <text x=\"{{ p.lx }}\" y=\"{{ p.ly }}\" text-anchor=\"middle\" font-size=\"9\" font-weight=\"700\" fill=\"#b3ab98\">{{ p.ll }}<\u002Ftext>\n              <\u002Fsc-for>\n            <\u002Fsvg>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noEpisodes }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"text-align:center;padding:64px 16px 0\">\n            <div style=\"position:relative;width:84px;height:84px;margin:0 auto 22px\"><div class=\"aura\" style=\"position:absolute;top:50%;left:50%;width:84px;height:84px;border-radius:50%;background:radial-gradient(circle,#9db391 0%,rgba(157,179,145,0) 70%);animation:breathe 5s ease-in-out infinite\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"font-size:18px;font-weight:700;margin-bottom:8px\">No patterns yet<\u002Fdiv>\n            <p style=\"margin:0 0 22px;font-size:14px;line-height:1.6;color:#a39c8c\">Your aura fills in as you log. A few<br>episodes is all it takes to see trends.<\u002Fp>\n            <div onclick=\"{{ loadSamples }}\" style=\"display:inline-block;padding:13px 22px;border:1px solid #d8d1c2;border-radius:16px;background:#fff;color:#6f7d66;font-size:14px;font-weight:700;cursor:pointer\">Try it with example data<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== REPORT ===================== -->\n      <sc-if value=\"{{ isReport }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:6px 28px 10px\"><h2 style=\"margin:0;font-size:23px;font-weight:700;letter-spacing:-.02em\">Doctor report<\u002Fh2><\u002Fdiv>\n      <div class=\"scr\" style=\"flex:1;overflow-y:auto;padding:4px 24px 24px;display:flex;flex-direction:column\">\n        <p style=\"margin:0 0 18px;font-size:13.5px;line-height:1.55;color:#8c8779\">Pick a date range and export a clean summary to share with your provider.<\u002Fp>\n        <div style=\"display:flex;gap:10px;margin-bottom:14px\">\n          <label style=\"flex:1;font-size:11px;color:#a39c8c;font-weight:600\">From<input type=\"date\" value=\"{{ reportFrom }}\" oninput=\"{{ onReportFrom }}\" style=\"width:100%;margin-top:6px;background:#fff;border:1px solid #e7e2d6;border-radius:12px;color:#2f352c;padding:11px 12px;font-size:13px\"><\u002Flabel>\n          <label style=\"flex:1;font-size:11px;color:#a39c8c;font-weight:600\">To<input type=\"date\" value=\"{{ reportTo }}\" oninput=\"{{ onReportTo }}\" style=\"width:100%;margin-top:6px;background:#fff;border:1px solid #e7e2d6;border-radius:12px;color:#2f352c;padding:11px 12px;font-size:13px\"><\u002Flabel>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;margin-bottom:20px\">\n          <button onclick=\"{{ exportCSV }}\" style=\"flex:1;padding:13px;border:none;border-radius:14px;background:#6f7d66;color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer\">Export CSV<\u002Fbutton>\n          <button onclick=\"{{ printReport }}\" style=\"flex:1;padding:13px;border:1px solid #d8d1c2;border-radius:14px;background:#fff;color:#5a604f;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer\">Print / PDF<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"border-top:1px solid #e7e2d6;padding-top:16px\">\n          <sc-if value=\"{{ hasReport }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:13px;font-weight:700;color:#7a7567;margin-bottom:12px\">{{ reportCount }}<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <sc-for list=\"{{ reportList }}\" as=\"r\" hint-placeholder-count=\"3\">\n                <div style=\"background:#fff;border:1px solid #efeadf;border-radius:16px;padding:13px 15px\">\n                  <div style=\"font-size:13.5px;font-weight:700;margin-bottom:4px\">{{ r.head }}<\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:#7a7567;line-height:1.55;white-space:pre-line\">{{ r.body }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noReport }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"text-align:center;padding:40px 0;color:#b3ab98;font-size:14px\">No episodes in this range.<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== BOTTOM NAV ===================== -->\n      <sc-if value=\"{{ showNav }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;border-top:1px solid #e9e3d7;background:rgba(250,248,243,.94);backdrop-filter:blur(10px);padding:9px 10px 24px;z-index:40\">\n        <div onclick=\"{{ goLog }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:{{ logColor }}\">\n          <svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.1\" stroke-linecap=\"round\"><line x1=\"12\" y1=\"6\" x2=\"12\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"12\" x2=\"18\" y2=\"12\"><\u002Fline><\u002Fsvg>\n          <span style=\"font-size:10.5px;font-weight:700;letter-spacing:.02em\">Log<\u002Fspan>\n        <\u002Fdiv>\n        <div onclick=\"{{ goHistory }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:{{ histColor }}\">\n          <svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.1\" stroke-linecap=\"round\"><line x1=\"9\" y1=\"7\" x2=\"19\" y2=\"7\"><\u002Fline><line x1=\"9\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><line x1=\"9\" y1=\"17\" x2=\"19\" y2=\"17\"><\u002Fline><circle cx=\"5\" cy=\"7\" r=\"1\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><circle cx=\"5\" cy=\"12\" r=\"1\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><circle cx=\"5\" cy=\"17\" r=\"1\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg>\n          <span style=\"font-size:10.5px;font-weight:700;letter-spacing:.02em\">History<\u002Fspan>\n        <\u002Fdiv>\n        <div onclick=\"{{ goInsights }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:{{ insColor }}\">\n          <svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"currentColor\" stroke=\"none\"><rect x=\"3\" y=\"12\" width=\"4\" height=\"8\" rx=\"1.2\"><\u002Frect><rect x=\"10\" y=\"6\" width=\"4\" height=\"14\" rx=\"1.2\"><\u002Frect><rect x=\"17\" y=\"3\" width=\"4\" height=\"17\" rx=\"1.2\"><\u002Frect><\u002Fsvg>\n          <span style=\"font-size:10.5px;font-weight:700;letter-spacing:.02em\">Insights<\u002Fspan>\n        <\u002Fdiv>\n        <div onclick=\"{{ goReport }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:{{ repColor }}\">\n          <svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"5\" y=\"3\" width=\"14\" height=\"18\" rx=\"2.4\"><\u002Frect><line x1=\"9\" y1=\"8\" x2=\"15\" y2=\"8\"><\u002Fline><line x1=\"9\" y1=\"12\" x2=\"15\" y2=\"12\"><\u002Fline><line x1=\"9\" y1=\"16\" x2=\"12.5\" y2=\"16\"><\u002Fline><\u002Fsvg>\n          <span style=\"font-size:10.5px;font-weight:700;letter-spacing:.02em\">Report<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;bottom:104px;left:50%;transform:translateX(-50%);background:#2f352c;color:#f1ede2;padding:12px 22px;border-radius:999px;font-size:14px;font-weight:600;z-index:70;box-shadow:0 10px 28px -8px rgba(0,0,0,.4);animation:toastin .25s ease;white-space:nowrap\">{{ toast }}<\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:460,&quot;height&quot;:900},&quot;reduceMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;startView&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Welcome&quot;,&quot;options&quot;:[&quot;Welcome&quot;,&quot;Log&quot;,&quot;History&quot;,&quot;Insights&quot;,&quot;Report&quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  constructor() {\n    super();\n    this.KEY = 'mybrain-aura-episodes';\n    this.LOCATIONS = ['Left side','Right side','Both sides','Forehead','Behind eyes','Back of head','Whole head'];\n    this.SYMPTOMS = ['Nausea','Vomiting','Light sensitivity','Sound sensitivity','Aura','Dizziness','Blurred vision','Neck stiffness','Fatigue','Brain fog','Other'];\n    this.TRIGGERS = ['Stress','Poor sleep','Dehydration','Skipped meal','Alcohol','Caffeine','Bright light','Weather change','Hormonal','Screen time','Strong smell','Other'];\n    this.RAMP = ['#8fae84','#9bae7d','#aeb077','#c1ab6e','#d4a368','#d49a68','#cd8a66','#c58064','#bd735a','#b5634f'];\n    this.state = {\n      view: 'landing',\n      episodes: [],\n      toast: '',\n      form: this.blankForm(),\n      reportFrom: '',\n      reportTo: '',\n      chartType: 'bar',\n      fs: false\n    };\n  }\n\n  blankForm() {\n    return { title: '', pain: 5, start: '', end: '', location: '', symptoms: [], triggers: [],\n             symptomOther: '', triggerOther: '', medName: '', medDose: '', medEffect: '', notes: '' };\n  }\n\n  componentDidMount() {\n    let eps = [];\n    try { eps = JSON.parse(localStorage.getItem(this.KEY)) || []; } catch (e) { eps = []; }\n    const sv = { 'Welcome':'landing','Log':'log','History':'history','Insights':'insights','Report':'report' };\n    const start = this.nowLocal();\n    let fs = false;\n    try {\n      this._mq = window.matchMedia('(max-width: 440px)');\n      fs = this._mq.matches;\n      this._onMq = (e) => this.setState({ fs: e.matches });\n      this._mq.addEventListener ? this._mq.addEventListener('change', this._onMq) : this._mq.addListener(this._onMq);\n    } catch (e) {}\n    this.setState(s => ({ episodes: eps, view: sv[this.props.startView] || 'landing', form: { ...s.form, start }, fs }));\n  }\n\n  componentWillUnmount() {\n    try { if (this._mq && this._onMq) { this._mq.removeEventListener ? this._mq.removeEventListener('change', this._onMq) : this._mq.removeListener(this._onMq); } } catch (e) {}\n  }\n\n  nowLocal() {\n    const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset());\n    return d.toISOString().slice(0,16);\n  }\n\n  persist(eps) { try { localStorage.setItem(this.KEY, JSON.stringify(eps)); } catch (e) {} }\n  nav(view) { this.setState({ view }); }\n  setForm(patch) { this.setState(s => ({ form: { ...s.form, ...patch } })); }\n\n  toggle(field, val) {\n    this.setState(s => {\n      const cur = s.form[field];\n      const next = cur.includes(val) ? cur.filter(x => x !== val) : [...cur, val];\n      return { form: { ...s.form, [field]: next } };\n    });\n  }\n\n  flash(msg) {\n    this.setState({ toast: msg });\n    clearTimeout(this._t);\n    this._t = setTimeout(() => this.setState({ toast: '' }), 1800);\n  }\n\n  saveEpisode() {\n    const f = this.state.form;\n    const syms = f.symptoms.filter(x => x !== 'Other');\n    if (f.symptoms.includes('Other') && f.symptomOther.trim()) syms.push(f.symptomOther.trim());\n    const trigs = f.triggers.filter(x => x !== 'Other');\n    if (f.triggers.includes('Other') && f.triggerOther.trim()) trigs.push(f.triggerOther.trim());\n    const ep = {\n      id: Date.now().toString(36),\n      title: f.title.trim(),\n      start: f.start || this.nowLocal(),\n      end: f.end || null,\n      pain: Number(f.pain),\n      location: f.location,\n      symptoms: syms,\n      triggers: trigs,\n      medName: f.medName.trim(),\n      medDose: f.medDose.trim(),\n      medEffect: f.medEffect,\n      notes: f.notes.trim()\n    };\n    const eps = [...this.state.episodes, ep];\n    this.persist(eps);\n    this.setState({ episodes: eps, form: { ...this.blankForm(), start: this.nowLocal() }, view: 'history' });\n    this.flash('Episode saved');\n  }\n\n  deleteEpisode(id) {\n    const eps = this.state.episodes.filter(e => e.id !== id);\n    this.persist(eps);\n    this.setState({ episodes: eps });\n  }\n\n  loadSamples() {\n    const now = Date.now(), day = 86400000;\n    const mk = (daysAgo, hr, dur, pain, loc, sy, tr, mn, md, me, nt) => {\n      const s = new Date(now - daysAgo*day); s.setHours(hr,0,0,0);\n      s.setMinutes(s.getMinutes() - s.getTimezoneOffset());\n      const e = dur ? new Date(s.getTime() + dur*3600000) : null;\n      return { id: Math.random().toString(36).slice(2), start: s.toISOString().slice(0,16),\n        end: e ? e.toISOString().slice(0,16) : null, pain, location: loc, symptoms: sy, triggers: tr,\n        medName: mn, medDose: md, medEffect: me, notes: nt };\n    };\n    const eps = [\n      mk(2, 14, 6, 7, 'Right side', ['Light sensitivity','Nausea'], ['Stress','Screen time'], 'Sumatriptan', '50mg', 'Partially relieved', 'Started after the afternoon meeting.'),\n      mk(6, 9, 3, 4, 'Behind eyes', ['Brain fog'], ['Poor sleep'], 'Ibuprofen', '400mg', 'Fully relieved', ''),\n      mk(13, 19, 9, 8, 'Whole head', ['Nausea','Sound sensitivity','Aura'], ['Stress','Dehydration'], 'Sumatriptan', '100mg', 'Kept stable', 'Rough one. Had to lie down.'),\n      mk(21, 16, 4, 5, 'Forehead', ['Light sensitivity'], ['Caffeine','Screen time'], '', '', '', ''),\n      mk(34, 11, 5, 6, 'Left side', ['Fatigue','Brain fog'], ['Poor sleep','Weather change'], 'Ibuprofen', '600mg', 'Partially relieved', ''),\n      mk(48, 20, 7, 7, 'Right side', ['Nausea','Light sensitivity'], ['Stress','Hormonal'], 'Sumatriptan', '50mg', 'No effect', '')\n    ];\n    this.persist(eps);\n    this.setState({ episodes: eps, view: 'insights' });\n    this.flash('Example data loaded');\n  }\n\n  // ---- formatting ----\n  painColor(p) { return p <= 3 ? '#8fae84' : p <= 6 ? '#d4ab6a' : '#c07d63'; }\n  painLabel(p) { return p <= 2 ? 'very mild' : p <= 4 ? 'mild' : p <= 6 ? 'moderate' : p <= 8 ? 'severe' : 'intense'; }\n  fmtDT(iso) { if (!iso) return ''; return new Date(iso).toLocaleString(undefined, { dateStyle:'medium', timeStyle:'short' }); }\n  fmtD(iso) { if (!iso) return ''; return new Date(iso).toLocaleDateString(undefined, { dateStyle:'medium' }); }\n  dur(ep) {\n    if (!ep.end) return '';\n    const ms = new Date(ep.end) - new Date(ep.start); if (ms <= 0) return '';\n    const h = ms/3600000; return h < 1 ? Math.round(ms/60000)+' min' : h.toFixed(1)+' hrs';\n  }\n  countBy(list, field) { const c = {}; list.forEach(ep => (ep[field]||[]).forEach(v => c[v]=(c[v]||0)+1)); return c; }\n  locsOf(ep) { return Array.isArray(ep.location) ? ep.location : (ep.location ? [ep.location] : []); }\n\n  buildLine(entries) {\n    const W = 300, H = 132, padX = 28, padY = 26, n = entries.length;\n    if (!n) return { path:'', area:'', points:[] };\n    const max = Math.max(...entries.map(e => e.n), 1);\n    const step = n > 1 ? (W - padX*2)/(n-1) : 0;\n    const pts = entries.map((e,i) => { const x = n > 1 ? padX + step*i : W/2; const y = H - padY - (e.n/max)*(H - padY*2); return { x, y, ll: e.ll, n: e.n }; });\n    const path = pts.map((p,i) => (i ? 'L' : 'M') + p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');\n    const area = path + ' L' + pts[pts.length-1].x.toFixed(1) + ',' + (H-padY) + ' L' + pts[0].x.toFixed(1) + ',' + (H-padY) + ' Z';\n    const points = pts.map(p => ({ cx: p.x.toFixed(1), cy: p.y.toFixed(1), vx: p.x.toFixed(1), vy: (p.y-9).toFixed(1), lx: p.x.toFixed(1), ly: (H-padY+16), ll: p.ll, n: p.n }));\n    return { path, area, points };\n  }\n\n  renderVals() {\n    const s = this.state, f = s.form, eps = s.episodes;\n    const view = s.view;\n    const dark = view === 'landing';\n    const pain = Number(f.pain);\n\n    const mkChips = (opts, sel, field) => opts.map(label => ({\n      label, sel: sel.includes(label), notSel: !sel.includes(label),\n      onClick: field === 'location'\n        ? () => this.setForm({ location: f.location === label ? '' : label })\n        : () => this.toggle(field, label)\n    }));\n    const locSel = f.location ? [f.location] : [];\n\n    const painCells = this.RAMP.map((col, i) => ({\n      bg: i < pain ? col : '#ece7da',\n      onClick: () => this.setForm({ pain: i + 1 })\n    }));\n\n    // ---- insights computed ----\n    const sorted = [...eps].sort((a,b) => new Date(b.start) - new Date(a.start));\n    const has = eps.length > 0;\n    let avgPain = '0', last30 = 0, avgDuration = '—', insightHeadline = '', insightSub = '', avgRingDash = '0 100', avgRingColor = '#d4ab6a';\n    let monthBars = [], triggerBars = [], symptomBars = [];\n    let monthLinePath = '', monthLineArea = '', monthLinePoints = [];\n    let symptomLine = { path:'', area:'', points:[] }, triggerLine = { path:'', area:'', points:[] };\n    let zoneFrontOp = '0.05', zoneRightOp = '0.05', zoneBackOp = '0.05', zoneLeftOp = '0.05';\n    let topLocationName = '—', topLocationCount = 'No location logged', locationList = [];\n\n    if (has) {\n      const ap = eps.reduce((a,e) => a + e.pain, 0) / eps.length;\n      avgPain = ap.toFixed(1);\n      avgRingColor = this.painColor(Math.round(ap));\n      avgRingDash = ((ap/10)*100).toFixed(0) + ' 100';\n      last30 = eps.filter(e => (Date.now() - new Date(e.start)) <= 30*86400000).length;\n      const wd = eps.filter(e => e.end && new Date(e.end) > new Date(e.start));\n      if (wd.length) { const avg = wd.reduce((a,e) => a + (new Date(e.end)-new Date(e.start)),0)/wd.length/3600000; avgDuration = avg < 1 ? Math.round(avg*60)+'m' : avg.toFixed(1)+'h'; }\n      const lvl = ap <= 3 ? 'gentle' : ap <= 6 ? 'moderate' : 'heavy';\n      insightHeadline = 'A ' + lvl + ' stretch';\n      const tc = this.countBy(eps, 'triggers');\n      const top = Object.entries(tc).sort((a,b) => b[1]-a[1])[0];\n      insightSub = top ? ('“' + top[0] + '” shows up most often — worth watching.') : 'Keep logging to surface your patterns.';\n\n      // months: last 6 calendar months\n      const labels = [], keys = [];\n      const base = new Date(); base.setDate(1);\n      for (let i = 5; i >= 0; i--) { const d = new Date(base.getFullYear(), base.getMonth()-i, 1); labels.push(d.toLocaleString(undefined,{month:'short'})); keys.push(d.getFullYear()+'-'+d.getMonth()); }\n      const mc = {}; eps.forEach(e => { const d = new Date(e.start); mc[d.getFullYear()+'-'+d.getMonth()] = (mc[d.getFullYear()+'-'+d.getMonth()]||0)+1; });\n      const mvals = keys.map(k => mc[k]||0); const mmax = Math.max(...mvals, 1);\n      monthBars = labels.map((m,i) => ({ m, h: (mvals[i]/mmax*100).toFixed(0)+'%' }));\n\n      const W = 300, H = 132, padX = 18, padY = 24, n = labels.length;\n      const step = n > 1 ? (W - padX*2)/(n-1) : 0;\n      const pts = labels.map((m,i) => { const x = padX + step*i; const y = H - padY - (mvals[i]/mmax)*(H - padY*2); return { x, y, m, count: mvals[i] }; });\n      monthLinePath = pts.map((p,i) => (i ? 'L' : 'M') + p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');\n      monthLineArea = monthLinePath + ' L' + pts[pts.length-1].x.toFixed(1) + ',' + (H-padY) + ' L' + pts[0].x.toFixed(1) + ',' + (H-padY) + ' Z';\n      monthLinePoints = pts.map(p => ({ cx: p.x.toFixed(1), cy: p.y.toFixed(1), vx: p.x.toFixed(1), vy: (p.y-9).toFixed(1), lx: p.x.toFixed(1), ly: (H-padY+16), m: p.m, count: p.count }));\n\n      const topBars = (counts) => { const e = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5); const mx = Math.max(...e.map(x=>x[1]),1); return e.map(([t,n]) => ({ t, n, ll: t.length>7 ? t.slice(0,6)+'…' : t, v:(n/mx*100).toFixed(0)+'%' })); };\n      triggerBars = topBars(this.countBy(eps,'triggers'));\n      symptomBars = topBars(this.countBy(eps,'symptoms'));\n      triggerLine = this.buildLine(triggerBars);\n      symptomLine = this.buildLine(symptomBars);\n\n      // head position heatmap (top-down zones)\n      const LZ = { 'Left side':['left'], 'Right side':['right'], 'Both sides':['left','right'], 'Forehead':['front'], 'Behind eyes':['front'], 'Back of head':['back'], 'Whole head':['front','right','back','left'] };\n      const zc = { front:0, right:0, back:0, left:0 }, lc = {};\n      eps.forEach(e => { this.locsOf(e).forEach(loc => { lc[loc] = (lc[loc]||0)+1; (LZ[loc]||[]).forEach(z => zc[z]++); }); });\n      const zmax = Math.max(zc.front, zc.right, zc.back, zc.left, 1);\n      const op = v => v > 0 ? (0.14 + 0.74*(v/zmax)).toFixed(2) : '0.05';\n      zoneFrontOp = op(zc.front); zoneRightOp = op(zc.right); zoneBackOp = op(zc.back); zoneLeftOp = op(zc.left);\n      const le = Object.entries(lc).sort((a,b) => b[1]-a[1]);\n      if (le.length) { topLocationName = le[0][0]; topLocationCount = le[0][1] + (le[0][1] === 1 ? ' episode' : ' episodes'); }\n      locationList = le.slice(0,4).map(([t,n]) => ({ t, n }));\n    }\n\n    const historyList = sorted.map(e => {\n      const tags = [...(e.symptoms||[]), ...(e.triggers||[])];\n      const locDur = [this.locsOf(e).join(', '), this.dur(e)].filter(Boolean).join(' · ');\n      return {\n        pain: e.pain, painBg: this.painColor(e.pain),\n        dateStr: e.title ? e.title : this.fmtDT(e.start),\n        metaStr: (e.title ? [this.fmtDT(e.start), locDur].filter(Boolean).join(' · ') : locDur) || 'No extra detail',\n        hasTags: tags.length > 0, tagsLine: tags.join(' · '),\n        hasMed: !!e.medName, medLine: [e.medName, e.medDose, e.medEffect].filter(Boolean).join(' · '),\n        hasNotes: !!e.notes, notes: e.notes,\n        onDelete: () => this.deleteEpisode(e.id)\n      };\n    });\n\n    // ---- report ----\n    const rf = s.reportFrom ? new Date(s.reportFrom) : null;\n    const rt = s.reportTo ? new Date(s.reportTo + 'T23:59:59') : null;\n    const repFiltered = sorted.filter(e => { const d = new Date(e.start); if (rf && d < rf) return false; if (rt && d > rt) return false; return true; });\n    const reportList = repFiltered.map(e => ({\n      head: (e.title ? e.title + ' · ' : '') + this.fmtDT(e.start) + ' · Pain ' + e.pain + '/10',\n      body: [\n        [this.locsOf(e).join(', '), this.dur(e)].filter(Boolean).join(' · '),\n        e.symptoms.length ? 'Symptoms: ' + e.symptoms.join(', ') : '',\n        e.triggers.length ? 'Triggers: ' + e.triggers.join(', ') : '',\n        e.medName ? 'Med: ' + [e.medName, e.medDose, e.medEffect].filter(Boolean).join(' ') : '',\n        e.notes ? 'Notes: ' + e.notes : ''\n      ].filter(Boolean).join('\\n')\n    }));\n\n    const navColor = (v) => view === v ? '#6f7d66' : '#b3ab98';\n\n    return {\n      motionClass: (this.props.reduceMotion ?? false) ? 'motion-off' : 'motion-on',\n      fsClass: this.state.fs ? 'fs' : '',\n      screenBg: dark ? '#1f2620' : '#f4f1ea',\n      statusColor: dark ? '#f1ede2' : '#2f352c',\n      isLanding: view === 'landing', isLog: view === 'log', isHistory: view === 'history',\n      isInsights: view === 'insights', isReport: view === 'report',\n      showNav: view !== 'landing',\n      landingLine: has ? (last30 + ' episodes in the last 30 days. Take a breath — you’ve got this.') : 'A quiet place to notice patterns, one episode at a time.',\n\n      // nav\n      logColor: navColor('log'), histColor: navColor('history'), insColor: navColor('insights'), repColor: navColor('report'),\n      goLog: () => this.nav('log'), goHistory: () => this.nav('history'), goInsights: () => this.nav('insights'),\n      goReport: () => this.nav('report'), goHome: () => this.nav('landing'),\n\n      // log form\n      pain, painColor: this.painColor(pain), painLabel: this.painLabel(pain),\n      auraBg: 'radial-gradient(circle, ' + this.painColor(pain) + 'd9 0%, ' + this.painColor(pain) + '00 70%)',\n      painCells,\n      start: f.start, end: f.end, onStart: (e) => this.setForm({ start: e.target.value }), onEnd: (e) => this.setForm({ end: e.target.value }),\n      locationChips: mkChips(this.LOCATIONS, locSel, 'location'),\n      symptomChips: mkChips(this.SYMPTOMS, f.symptoms, 'symptoms'),\n      triggerChips: mkChips(this.TRIGGERS, f.triggers, 'triggers'),\n      showSymptomOther: f.symptoms.includes('Other'), hideSymptomOther: !f.symptoms.includes('Other'),\n      showTriggerOther: f.triggers.includes('Other'), hideTriggerOther: !f.triggers.includes('Other'),\n      symptomOther: f.symptomOther, triggerOther: f.triggerOther,\n      onSymptomOther: (e) => this.setForm({ symptomOther: e.target.value }),\n      onTriggerOther: (e) => this.setForm({ triggerOther: e.target.value }),\n      medName: f.medName, medDose: f.medDose, medEffect: f.medEffect, notes: f.notes,\n      onMedName: (e) => this.setForm({ medName: e.target.value }), onMedDose: (e) => this.setForm({ medDose: e.target.value }),\n      onMedEffect: (e) => this.setForm({ medEffect: e.target.value }), onNotes: (e) => this.setForm({ notes: e.target.value }),\n      saveEpisode: () => this.saveEpisode(),\n      title: f.title, onTitle: (e) => this.setForm({ title: e.target.value }),\n\n      // history\n      hasEpisodes: has, noEpisodes: !has,\n      countLabel: eps.length ? (eps.length + (eps.length === 1 ? ' episode' : ' episodes')) : '',\n      historyList, loadSamples: () => this.loadSamples(),\n\n      // insights\n      avgPain, last30, avgDuration, total: eps.length,\n      avgRingColor, avgRingDash, insightHeadline, insightSub,\n      monthBars, triggerBars, symptomBars,\n      chartIsBar: s.chartType === 'bar', chartIsLine: s.chartType === 'line',\n      chartBarColor: s.chartType === 'bar' ? '#fff' : '#a39c8c', chartBarBg: s.chartType === 'bar' ? '#6f7d66' : 'transparent',\n      chartLineColor: s.chartType === 'line' ? '#fff' : '#a39c8c', chartLineBg: s.chartType === 'line' ? '#6f7d66' : 'transparent',\n      setChartBar: () => this.setState({ chartType: 'bar' }), setChartLine: () => this.setState({ chartType: 'line' }),\n      monthLinePath, monthLineArea, monthLinePoints,\n      symptomLinePath: symptomLine.path, symptomLineArea: symptomLine.area, symptomLinePoints: symptomLine.points,\n      triggerLinePath: triggerLine.path, triggerLineArea: triggerLine.area, triggerLinePoints: triggerLine.points,\n      zoneFrontOp, zoneRightOp, zoneBackOp, zoneLeftOp, topLocationName, topLocationCount, locationList,\n\n      // report\n      reportFrom: s.reportFrom, reportTo: s.reportTo,\n      onReportFrom: (e) => this.setState({ reportFrom: e.target.value }),\n      onReportTo: (e) => this.setState({ reportTo: e.target.value }),\n      hasReport: reportList.length > 0, noReport: reportList.length === 0,\n      reportCount: repFiltered.length + (repFiltered.length === 1 ? ' episode' : ' episodes') + ' in range',\n      reportList,\n      exportCSV: () => this.exportCSV(repFiltered),\n      printReport: () => { try { window.print(); } catch (e) {} },\n\n      toast: s.toast\n    };\n  }\n\n  exportCSV(list) {\n    if (!list.length) { this.flash('Nothing to export'); return; }\n    const headers = ['Title','Start','End','Pain','Location','Symptoms','Triggers','Medication','Dose','Effectiveness','Notes'];\n    const rows = list.map(e => [e.title||'', e.start, e.end||'', e.pain, this.locsOf(e).join('; '), (e.symptoms||[]).join('; '), (e.triggers||[]).join('; '), e.medName||'', e.medDose||'', e.medEffect||'', (e.notes||'').replace(/\\n/g,' ')]);\n    const csv = [headers, ...rows].map(r => r.map(c => '\"' + String(c).replace(/\"/g,'\"\"') + '\"').join(',')).join('\\n');\n    try {\n      const blob = new Blob([csv], { type: 'text/csv' });\n      const url = URL.createObjectURL(blob);\n      const a = document.createElement('a');\n      a.href = url; a.download = 'migraine-report-' + new Date().toISOString().slice(0,10) + '.csv';\n      a.click(); URL.revokeObjectURL(url);\n      this.flash('CSV exported');\n    } catch (e) { this.flash('Export blocked here'); }\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
